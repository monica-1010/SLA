<!DOCTYPE html>
<html>
<style>
  .container {
    display: flex;
    flex-direction: row;
    height: 300px;
    width: 400px;
    gap: 1rem;
    background-color: green;

    justify-content: space-between;
    align-items: center;

  }

  .container .idcard {
    width: 50px;
    height: 120px;


  }

  .id1 {
    background-color: blue;
  }

  .id2 {
    background-color: yellow;
  }

  .id3 {
    background-color: red;
  }

  .id4 {
    background-color: gold;
  }

  .id5 {
    background-color: grey;
  }

  .id6 {
    background-color: pink;
  }

  .id7 {
    background-color: skyblue;
  }

  .id8 {
    background-color: maroon;
  }
</style>

<body>

  <div class="container">
    <div class="idcard id1">one</div>
    <div class="idcard id2">2</div>
    <div class="idcard id3">3</div>
    <div class="idcard id4">4</div>
    <div class="idcard id5">5</div>
    <div class="idcard id6">6</div>
    <div class="idcard id7">7</div>
    <div class="idcard id8">8</div>
  </div>

</body>

</html>
