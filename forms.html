<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Registration Form</title>
</head>
<body>

    <h1>User Registration</h1>
    <p>Please fill out the form below. Fields marked with * are required.</p>

    <form action="#" method="POST">

        <fieldset>
            <legend>Account Security</legend>
            
            <label for="username">Username*:</label><br>
            <input type="text" id="username" name="username" 
                   minlength="3" maxlength="50" placeholder="User123" required>
            <br><br>

            <label for="pass">Password*:</label><br>
            <input type="password" id="pass" name="password" 
                   minlength="8" placeholder="At least 8 characters" required>
            <br><br>
      

       
            <legend>Contact Details</legend>

            <label for="email">Email Address*:</label><br>
            <input type="email" id="email" name="user_email" 
                   placeholder="example@mail.com" required>
            <br><br>

            <label for="phone">Phone Number (10 digits)*:</label><br>
            <input type="tel" id="phone" name="user_phone" 
                   pattern="^\d{10}$" autocomplete="tel" 
                   placeholder="1234567890" title="Enter exactly 10 digits" required>
            <br><br>

            <label for="zip">Zip Code (5 digits):</label><br>
            <input type="text" id="zip" name="zip_code" 
                   pattern="^\d{5}$" placeholder="12345">
            <br><br>
        
            <legend>Personal Details</legend>

            <label for="age">Age:</label><br>
            <input type="number" id="age" name="user_age" min="18" max="100">
            <br><br>

            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
            <br><br>

            <label>Hobbies (Select all that apply):</label><br>
            <input type="checkbox" id="hobby1" name="hobbies" value="coding">
            <label for="hobby1">Coding</label>
            <input type="checkbox" id="hobby2" name="hobbies" value="reading">
            <label for="hobby2">Reading</label>
            <br><br>

            <label for="bio">Short Bio:</label><br>
            <textarea id="bio" name="bio" maxlength="200" rows="4" cols="30" 
                      placeholder="Tell us about yourself..."></textarea>
        </fieldset>

        <br>

        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms">I agree to the terms and conditions*</label>
        
        <br><br>

        <button type="submit">Register Now</button>
        <button type="reset">Clear Form</button>

    </form>

</body>
</html>
