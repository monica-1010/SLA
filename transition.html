<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition & Hover Task</title>
    <style>
        body {
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .box {

            width: 250px;
            padding: 40px;
            border: 5px solid #34495e;
            margin: 20px;
            background-color: #ffffff;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease-in-out;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .box:hover {

            background-color: #3498db;
            border-color: #2980b9;
            color: white;
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            padding: 50px 30px;
        }

        .instruction {
            font-size: 0.9rem;
            margin-top: 15px;
            display: block;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="box">
        <strong>Hover Over Me!</strong>
        <span class="instruction">Watch the margin, border, and padding react smoothly.</span>
    </div>

</body>

</html>
