<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Async Lab: Timeout & Interval</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 450px;
            text-align: center;
        }

        .timer-display {
            font-size: 3rem;
            font-weight: bold;
            color: #2c3e50;
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .status {
            color: #7f8c8d;
            font-style: italic;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        .log-box {
            text-align: left;
            font-family: monospace;
            background: #272822;
            color: #f8f8f2;
            padding: 10px;
            margin-top: 20px;
            border-radius: 5px;
            font-size: 0.85rem;
        }
    </style>
</head>

        <p class="status" id="status-text">Click to start 5s countdown</p>

        <div class="log-box" id="log">

        </div>
    </div>
