<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>JavaScript Loops</title>
</head>

<body>


    <script>
        // 1. For Loop: 1 to 10
        console.log("--- For Loop (1-10) ---");
        for (let i = 1; i <= 10; i++) {
            console.log(i);
        }

        // 2. While Loop: 1 to 5
        console.log("--- While Loop (1-5) ---");
        let w = 1;
        while (w <= 5) {
            console.log(w);
            w++;
        }

        // 3. Do-While Loop: 1 to 3
        console.log("--- Do-While Loop (1-3) ---");
        let d = 1;
        do {
            console.log(d);
            d++;
        } while (d <= 3);

        // 4. Break and Continue (1 to 10, skip 5, stop at 8)
        console.log("--- Break and Continue ---");
        for (let x = 1; x <= 10; x++) {
            if (x === 5) {
                continue; // Skip 5
            }
            if (x === 8) {
                break; // Stop before 8
            }
            console.log(x);
        }
    </script>
</body>

</html>
